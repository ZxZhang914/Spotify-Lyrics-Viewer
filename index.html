<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Spotify Lyrics Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@latest/tabler-icons.min.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green: #1DB954; --green-bright: #1ed760;
      --bg-base: #121212; --bg-elevated: #181818; --bg-highlight: #282828;
      --text-base: #ffffff; --text-subdued: #b3b3b3; --text-muted: #6a6a6a;
      --border: rgba(255,255,255,0.08);
    }
    html, body { height: 100%; background: var(--bg-base); color: var(--text-base); font-family: 'DM Sans', sans-serif; -webkit-font-smoothing: antialiased; }

    #setup-screen { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2rem; padding: 2rem; text-align: center; }
    .setup-logo { display: flex; align-items: center; gap: 12px; }
    .setup-logo svg { width: 48px; height: 48px; }
    .setup-logo-text { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
    .setup-logo-text em { font-style: normal; color: var(--green); }
    .setup-tagline { font-size: 16px; color: var(--text-subdued); max-width: 380px; line-height: 1.6; }
    .btn-connect { background: var(--green); color: #000; border: none; border-radius: 500px; padding: 16px 44px; font-size: 15px; font-weight: 700; font-family: inherit; cursor: pointer; letter-spacing: 0.5px; transition: background 0.15s, transform 0.1s; }
    .btn-connect:hover { background: var(--green-bright); }
    .btn-connect:active { transform: scale(0.97); }
    .setup-note { font-size: 12px; color: var(--text-muted); max-width: 340px; line-height: 1.7; }
    .setup-error { color: #e24b4a; font-size: 13px; background: rgba(226,75,74,0.1); border: 1px solid rgba(226,75,74,0.2); border-radius: 8px; padding: 12px 20px; max-width: 360px; }

    #main-screen { display: none; height: 100vh; flex-direction: column; max-width: 680px; margin: 0 auto; }
    #main-screen.visible { display: flex; }

    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 20px; border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .topbar-brand { display: flex; align-items: center; gap: 10px; font-size: 14px; font-weight: 600; }
    .topbar-brand svg { width: 22px; height: 22px; }
    .status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2.4s ease-in-out infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.3} }
    .topbar-actions { display: flex; gap: 8px; align-items: center; }
    .btn-icon { background: transparent; border: 0.5px solid var(--border); color: var(--text-subdued); border-radius: 500px; padding: 7px 14px; font-size: 12px; font-family: inherit; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: border-color 0.15s, color 0.15s; }
    .btn-icon:hover { border-color: var(--green); color: var(--green); }
    .btn-icon i { font-size: 15px; }

    .now-playing { display: none; align-items: center; gap: 16px; padding: 14px 20px; background: var(--bg-elevated); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
    .now-playing.visible { display: flex; }
    .cover-wrap { width: 54px; height: 54px; border-radius: 4px; overflow: hidden; background: var(--bg-highlight); flex-shrink: 0; display: flex; align-items: center; justify-content: center; }
    .cover-wrap img { width: 100%; height: 100%; object-fit: cover; display: none; }
    .cover-wrap i { font-size: 22px; color: var(--text-muted); }
    .track-meta { flex: 1; min-width: 0; }
    .track-name { font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .track-artist { font-size: 13px; color: var(--text-subdued); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .eq-bars { display: flex; align-items: flex-end; gap: 2px; height: 20px; flex-shrink: 0; }
    .eq-bar { width: 3px; background: var(--green); border-radius: 2px; animation: eq 1.3s ease-in-out infinite; }
    .eq-bar:nth-child(1){height:6px;animation-delay:0s} .eq-bar:nth-child(2){height:14px;animation-delay:.25s} .eq-bar:nth-child(3){height:9px;animation-delay:.5s} .eq-bar:nth-child(4){height:17px;animation-delay:.15s}
    @keyframes eq { 0%,100%{transform:scaleY(.35)} 50%{transform:scaleY(1)} }

    .progress-bar-wrap { height: 3px; background: #1a1a1a; flex-shrink: 0; }
    .progress-bar-fill { height: 100%; background: var(--green); width: 0%; transition: width 2s linear; }

    .lyrics-scroll { flex: 1; overflow-y: auto; scroll-behavior: smooth; }
    .lyrics-scroll::-webkit-scrollbar{width:4px} .lyrics-scroll::-webkit-scrollbar-track{background:transparent} .lyrics-scroll::-webkit-scrollbar-thumb{background:#2a2a2a;border-radius:2px}
    .lyrics-inner { padding: 2.5rem 2rem 4rem; display: flex; flex-direction: column; gap: 4px; }
    .lyric-line { font-size: 18px; font-weight: 500; color: #2e2e2e; line-height: 1.65; padding: 5px 0; transition: color 0.35s ease, font-size 0.3s ease; cursor: default; user-select: none; }
    .lyric-line.past { color: #2a2a2a; }
    .lyric-line.near { color: #707070; font-size: 19px; }
    .lyric-line.active { color: #ffffff; font-size: 22px; font-weight: 600; }

    .state-view { display: flex; flex-direction: column; align-items: center; justify-content: center; flex: 1; gap: 14px; padding: 2rem; text-align: center; min-height: 300px; }
    .state-view i { font-size: 44px; color: #222; }
    .state-view p { font-size: 14px; color: var(--text-subdued); line-height: 1.7; max-width: 280px; }
    .state-view span { color: var(--text-base); }
    .spinner { width: 30px; height: 30px; border: 2px solid #2a2a2a; border-top-color: var(--green); border-radius: 50%; animation: spin 0.75s linear infinite; }
    @keyframes spin { to{transform:rotate(360deg)} }

    .lyrics-footer { padding: 8px 20px 16px; font-size: 11px; color: var(--text-muted); text-align: center; flex-shrink: 0; border-top: 0.5px solid transparent; }
    .lyrics-footer.visible { color: #444; border-top-color: var(--border); }
  </style>
</head>
<body>

<div id="setup-screen">
  <div class="setup-logo">
    <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="12" fill="#1DB954"/><path d="M17.5 16.5c-.2 0-.3-.1-.5-.2-1.8-1.1-4-1.6-6.6-1.6-1.4 0-2.7.2-3.9.4-.3.1-.5-.1-.6-.4-.1-.3.1-.5.4-.6 1.3-.3 2.8-.5 4.1-.5 2.8 0 5.3.6 7.3 1.8.2.1.3.4.2.7-.1.3-.2.4-.4.4zm1-2.7c-.2 0-.4-.1-.5-.2-2-1.2-5-1.9-8.1-1.9-1.5 0-3 .2-4.2.6-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7 1.3-.4 2.9-.6 4.5-.6 3.4 0 6.6.8 8.8 2.1.3.2.4.5.2.8-.1.2-.3.3-.4.3zm1.1-2.9c-.2 0-.3 0-.5-.1C16.8 9.4 13.3 8.6 9.5 8.6c-1.9 0-3.7.2-5.3.7-.3.1-.7-.1-.8-.4-.1-.3.1-.7.4-.8 1.7-.5 3.7-.7 5.7-.7 4 0 7.9.9 10.8 2.6.3.2.4.5.2.8-.1.2-.4.3-.5.3z" fill="#000"/></svg>
    <div class="setup-logo-text">Lyrics <em>Viewer</em></div>
  </div>
  <p class="setup-tagline">Scrolling lyrics for whatever you're playing on Spotify — connect once, works instantly.</p>
  <button class="btn-connect" onclick="connectSpotify()">Connect with Spotify</button>
  <p id="setup-error" class="setup-error" style="display:none"></p>
  <p class="setup-note">Only requests read access to your currently playing track. No data is stored anywhere.</p>
</div>

<div id="main-screen">
  <div class="topbar">
    <div class="topbar-brand">
      <svg viewBox="0 0 24 24" fill="none"><circle cx="12" cy="12" r="12" fill="#1DB954"/><path d="M17.5 16.5c-.2 0-.3-.1-.5-.2-1.8-1.1-4-1.6-6.6-1.6-1.4 0-2.7.2-3.9.4-.3.1-.5-.1-.6-.4-.1-.3.1-.5.4-.6 1.3-.3 2.8-.5 4.1-.5 2.8 0 5.3.6 7.3 1.8.2.1.3.4.2.7-.1.3-.2.4-.4.4zm1-2.7c-.2 0-.4-.1-.5-.2-2-1.2-5-1.9-8.1-1.9-1.5 0-3 .2-4.2.6-.3.1-.6-.1-.7-.4-.1-.3.1-.6.4-.7 1.3-.4 2.9-.6 4.5-.6 3.4 0 6.6.8 8.8 2.1.3.2.4.5.2.8-.1.2-.3.3-.4.3zm1.1-2.9c-.2 0-.3 0-.5-.1C16.8 9.4 13.3 8.6 9.5 8.6c-1.9 0-3.7.2-5.3.7-.3.1-.7-.1-.8-.4-.1-.3.1-.7.4-.8 1.7-.5 3.7-.7 5.7-.7 4 0 7.9.9 10.8 2.6.3.2.4.5.2.8-.1.2-.4.3-.5.3z" fill="#000"/></svg>
      <span>Lyrics Viewer</span>
      <div class="status-dot"></div>
    </div>
    <div class="topbar-actions">
      <button class="btn-icon" onclick="refreshTrack()"><i class="ti ti-refresh"></i>Refresh</button>
      <button class="btn-icon" onclick="logout()" title="Disconnect"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <div class="now-playing" id="nowPlaying">
    <div class="cover-wrap"><i class="ti ti-music" id="coverIcon"></i><img id="coverImg" alt="Album art"/></div>
    <div class="track-meta">
      <div class="track-name" id="trackName">—</div>
      <div class="track-artist" id="trackArtist">—</div>
    </div>
    <div class="eq-bars"><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div><div class="eq-bar"></div></div>
  </div>

  <div class="progress-bar-wrap"><div class="progress-bar-fill" id="progressFill"></div></div>

  <div id="lyricsContainer" class="lyrics-scroll">
    <div class="state-view">
      <i class="ti ti-player-pause"></i>
      <p>Play something on Spotify, then hit <span>Refresh</span></p>
    </div>
  </div>

  <div class="lyrics-footer" id="lyricsFooter"></div>
</div>

<script>
const CLIENT_ID = 'd71ace25c4f24990ab28668fab7e61e8';
const REDIRECT_URI = window.location.origin + window.location.pathname.replace(/\/$/, '') + '/';
const SCOPES = 'user-read-currently-playing user-read-playback-state';

let token = null;
let scrollTimer = null;
let pollTimer = null;
let currentTrackId = null;

/* ── PKCE helpers ── */
function base64url(buffer) {
  return btoa(String.fromCharCode(...new Uint8Array(buffer)))
    .replace(/\+/g, '-').replace(/\//g, '_').replace(/=/g, '');
}

async function generatePKCE() {
  const verifier = base64url(crypto.getRandomValues(new Uint8Array(32)));
  const challenge = base64url(await crypto.subtle.digest('SHA-256', new TextEncoder().encode(verifier)));
  return { verifier, challenge };
}

/* ── Auth ── */
async function connectSpotify() {
  const { verifier, challenge } = await generatePKCE();
  const state = base64url(crypto.getRandomValues(new Uint8Array(12)));
  sessionStorage.setItem('sp_verifier', verifier);
  sessionStorage.setItem('sp_state', state);

  const p = new URLSearchParams({
    client_id: CLIENT_ID,
    response_type: 'code',
    redirect_uri: REDIRECT_URI,
    scope: SCOPES,
    state,
    code_challenge_method: 'S256',
    code_challenge: challenge
  });
  window.location.href = 'https://accounts.spotify.com/authorize?' + p;
}

async function exchangeCode(code) {
  const verifier = sessionStorage.getItem('sp_verifier');
  const body = new URLSearchParams({
    grant_type: 'authorization_code',
    code,
    redirect_uri: REDIRECT_URI,
    client_id: CLIENT_ID,
    code_verifier: verifier
  });
  const r = await fetch('https://accounts.spotify.com/api/token', {
    method: 'POST',
    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
    body
  });
  if (!r.ok) throw new Error('Token exchange failed');
  const d = await r.json();
  return d.access_token;
}

function logout() {
  sessionStorage.clear();
  token = null;
  if (pollTimer) clearInterval(pollTimer);
  if (scrollTimer) clearInterval(scrollTimer);
  document.getElementById('main-screen').classList.remove('visible');
  document.getElementById('main-screen').style.display = 'none';
  document.getElementById('setup-screen').style.display = 'flex';
}

function showMain() {
  document.getElementById('setup-screen').style.display = 'none';
  const m = document.getElementById('main-screen');
  m.style.display = 'flex';
  m.classList.add('visible');
}

/* ── Spotify API ── */
async function getPlaying() {
  const r = await fetch('https://api.spotify.com/v1/me/player/currently-playing', {
    headers: { Authorization: 'Bearer ' + token }
  });
  if (r.status === 204 || r.status === 401) return null;
  if (!r.ok) return null;
  const d = await r.json();
  if (!d || !d.item) return null;
  return {
    id: d.item.id,
    name: d.item.name,
    artist: d.item.artists.map(a => a.name).join(', '),
    albumImg: d.item.album?.images?.[0]?.url || null,
    progressMs: d.progress_ms || 0,
    durationMs: d.item.duration_ms || 1
  };
}

/* ── Lyrics ── */
async function getLyrics(artist, title) {
  try {
    const a = artist.split(/,|feat\.|&/)[0].trim();
    const r = await fetch(`https://api.lyrics.ovh/v1/${encodeURIComponent(a)}/${encodeURIComponent(title)}`);
    if (!r.ok) return null;
    const d = await r.json();
    return d.lyrics || null;
  } catch { return null; }
}

function parseLines(raw) {
  return raw.split('\n').map(l => l.trim()).filter(Boolean);
}

/* ── UI ── */
function setContainer(html) {
  document.getElementById('lyricsContainer').innerHTML = html;
}

function updateNowPlaying(track) {
  document.getElementById('nowPlaying').classList.add('visible');
  document.getElementById('trackName').textContent = track.name;
  document.getElementById('trackArtist').textContent = track.artist;
  const img = document.getElementById('coverImg');
  const icon = document.getElementById('coverIcon');
  if (track.albumImg) { img.src = track.albumImg; img.style.display = 'block'; icon.style.display = 'none'; }
  else { img.style.display = 'none'; icon.style.display = 'block'; }
  document.getElementById('progressFill').style.width = Math.round((track.progressMs / track.durationMs) * 100) + '%';
}

function renderLyrics(lines) {
  const c = document.getElementById('lyricsContainer');
  c.innerHTML = '';
  const inner = document.createElement('div');
  inner.className = 'lyrics-inner';
  lines.forEach((line, i) => {
    const el = document.createElement('div');
    el.className = 'lyric-line' + (i === 0 ? ' active' : '');
    el.dataset.i = i;
    el.textContent = line;
    inner.appendChild(el);
  });
  c.appendChild(inner);
}

function highlightLine(index) {
  const lines = document.getElementById('lyricsContainer').querySelectorAll('.lyric-line');
  lines.forEach((el, i) => {
    el.classList.remove('active', 'near', 'past');
    if (i < index) el.classList.add('past');
    else if (i === index) el.classList.add('active');
    else if (Math.abs(i - index) === 1) el.classList.add('near');
  });
  if (lines[index]) lines[index].scrollIntoView({ behavior: 'smooth', block: 'center' });
}

function startScroll(lines, progressMs, durationMs) {
  if (scrollTimer) clearInterval(scrollTimer);
  const total = lines.length;
  if (!total) return;
  const msPerLine = durationMs / total;
  let elapsed = progressMs;
  let cur = Math.min(Math.floor(elapsed / msPerLine), total - 1);
  highlightLine(cur);

  scrollTimer = setInterval(() => {
    elapsed += 2000;
    const next = Math.min(Math.floor(elapsed / msPerLine), total - 1);
    if (next !== cur) { cur = next; highlightLine(cur); }
    document.getElementById('progressFill').style.width = Math.min(Math.round((elapsed / durationMs) * 100), 100) + '%';
    if (cur >= total - 1) clearInterval(scrollTimer);
  }, 2000);
}

/* ── Main flow ── */
async function refreshTrack() {
  if (scrollTimer) clearInterval(scrollTimer);
  setContainer('<div class="state-view"><div class="spinner"></div><p>Fetching track…</p></div>');

  const track = await getPlaying();
  if (!track) {
    document.getElementById('nowPlaying').classList.remove('visible');
    document.getElementById('progressFill').style.width = '0%';
    setContainer('<div class="state-view"><i class="ti ti-player-pause"></i><p>Nothing playing. Start a song on Spotify and refresh.</p></div>');
    const f = document.getElementById('lyricsFooter'); f.textContent = ''; f.className = 'lyrics-footer';
    return;
  }

  updateNowPlaying(track);
  currentTrackId = track.id;
  setContainer('<div class="state-view"><div class="spinner"></div><p>Searching lyrics…</p></div>');

  const raw = await getLyrics(track.artist, track.name);
  if (!raw) {
    setContainer(`<div class="state-view"><i class="ti ti-file-x"></i><p>No lyrics found for <span>${track.name}</span>.</p></div>`);
    const f = document.getElementById('lyricsFooter'); f.textContent = ''; f.className = 'lyrics-footer';
    return;
  }

  const lines = parseLines(raw);
  renderLyrics(lines);
  startScroll(lines, track.progressMs, track.durationMs);

  const f = document.getElementById('lyricsFooter');
  f.textContent = 'Lyrics via lyrics.ovh · Auto-scroll synced to track progress';
  f.className = 'lyrics-footer visible';
}

function startPoll() {
  if (pollTimer) clearInterval(pollTimer);
  pollTimer = setInterval(async () => {
    const t = await getPlaying();
    if (t && t.id !== currentTrackId) refreshTrack();
  }, 15000);
}

/* ── Boot ── */
async function boot() {
  const params = new URLSearchParams(window.location.search);
  const code = params.get('code');
  const error = params.get('error');

  if (error) {
    history.replaceState(null, '', window.location.pathname);
    const el = document.getElementById('setup-error');
    el.textContent = 'Spotify authorization failed: ' + error;
    el.style.display = 'block';
    return;
  }

  if (code) {
    history.replaceState(null, '', window.location.pathname);
    try {
      token = await exchangeCode(code);
      sessionStorage.setItem('sp_token', token);
      showMain();
      refreshTrack();
      startPoll();
    } catch (e) {
      const el = document.getElementById('setup-error');
      el.textContent = 'Failed to get access token. Please try connecting again.';
      el.style.display = 'block';
    }
    return;
  }

  const stored = sessionStorage.getItem('sp_token');
  if (stored) {
    token = stored;
    showMain();
    refreshTrack();
    startPoll();
  }
}

boot();
</script>
</body>
</html>
